apiVersion: v1
kind: Namespace
metadata:
  name: dashboard
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: dashboard
data:
  ConnectionStrings__DefaultConnection: "Host=postgres-service;Port=5432;Database=dashboard;Username=postgres;Password=postgres"
  ASPNETCORE_ENVIRONMENT: "Production"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: dashboard
type: Opaque
stringData:
  POSTGRES_PASSWORD: postgres
  POSTGRES_USER: postgres
  POSTGRES_DB: dashboard

